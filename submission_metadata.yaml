# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  TalentRank AI is an NLP-based candidate discovery and ranking system that
  analyzes a Job Description, generates its semantic representation, retrieves
  the most relevant candidates using a FAISS vector index, and evaluates them
  through a hybrid ranking engine. The ranking combines semantic relevance,
  skill alignment, experience matching, career progression, and candidate
  quality indicators to produce the final ranked list. The system also generates
  explainable recommendations for every candidate, improving transparency for
  recruiters. Large artifacts are precomputed and automatically downloaded from
  Hugging Face at startup, enabling lightweight deployment while meeting CPU-only
  execution requirements.

